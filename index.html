    <style>
        :root {
            --bg-color: #5a5a5a; 
            --card-bg: #000000; /* 余白を黒にするため、カード背景を黒に */
            --text-color: #f5f5f5;
            --accent-color: #1da1f2;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            /* Noto Serif JP を優先的に適用するように変更 */
            font-family: 'Noto Serif JP', "Hiragino Mincho ProN", "MS PMincho", serif;
            margin: 0;
            padding: 30px 15px; /* PORTFOLIO上の空間調整 */
            line-height: 1.6;
        }

        header {
            text-align: center;
            margin-top: 0;
            margin-bottom: 5px;
        }

        h1 { 
            margin: 0;
            font-size: 1.8rem; 
            letter-spacing: 0.7em; /* 設定した値 */
            text-indent: 0.7em;    /* letter-spacingと同じ値を足すと、中央に揃います */
            font-weight: 400;
            border-bottom: 1px solid rgba(255,255,255,0.3);
            display: inline-block;
            padding-bottom: 2px;
        }

        h2 { 
            border-left: 2px solid var(--accent-color);
            padding-left: 15px;
            margin: 20px auto 10px;
            max-width: 1400px;
            font-size: 1.4rem;
            font-weight: 400;
            letter-spacing: 0.1em;
        }

        h2:first-of-type { margin-top: 0; }

        /* --- レスポンシブ・グリッド設定 --- */
        .gallery {
            display: grid;
            gap: 15px;
            max-width: 1400px;
            margin: 0 auto 40px;
            /* デフォルト（PC）は5列 */
            grid-template-columns: repeat(5, 1fr);
        }

        /* 画面幅 1200px以下：4列 */
        @media (max-width: 1200px) {
            .gallery { grid-template-columns: repeat(4, 1fr); }
        }

        /* 画面幅 992px以下：3列 */
        @media (max-width: 992px) {
            .gallery { grid-template-columns: repeat(3, 1fr); }
        }

        /* 画面幅 768px以下（スマホ）：2列 */
        @media (max-width: 768px) {
            .gallery { 
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }
            /* スマホでも縦長を維持。PC設定が継承されますが明示しておきます */
            .gallery-item { aspect-ratio: 2 / 3; } 
            h1 { font-size: 1.5rem; }
            h2 { font-size: 1.1rem; }
        }

        .gallery-item {
            background: var(--card-bg);
            /* ★ここを変更：√2（日本のA4/B5サイズなどの雑誌比率）に変更（横1:縦√2） */
            aspect-ratio: 1 / 1; 
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 2px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .gallery-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* ★重要：縮小して全体を表示（余白は黒） */
            display: block;
            filter: grayscale(15%);
            transition: 0.4s;
        }

        .gallery-item:hover img { filter: grayscale(0%); }

        /* モーダル */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(15, 15, 15, 0.96);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: #fff;
            padding: 10px;
            border-radius: 8px;
            max-width: 600px;
            width: 95%;
            max-height: 100vh;
            overflow-y: auto;
        }

        .close-btn {
            position: absolute;
            top: 20px; right: 30px;
            color: #fff;
            font-size: 50px;
            cursor: pointer;
            font-family: sans-serif;
            line-height: 1;
        }

        /* --- フッター設定 --- */
        footer {
            text-align: center;
            padding: 60px 0 30px; /* 上に余白を持たせて作品と離す */
            font-size: 0.8rem;
        }

        .disclaimer {
            font-size: 0.8rem;     /* 注意書きをさらに小さく */
            opacity: 0.8;           /* 少し薄くして控えめに */
            margin-bottom: 10px;    /* コピーライトとの間隔 */
            line-height: 1.6;
        }
    </style>
</head>

<div id="myModal" class="modal">

<script async src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>
<script>
    function openModal(id) {
        const container = document.getElementById('tweet-container');
        container.innerHTML = ''; 
        document.getElementById('myModal').style.display = 'flex';
        twttr.widgets.createTweet(id, container, { theme: 'dark', align: 'center', dnt: true });
    }
    function closeModal() {
        document.getElementById('myModal').style.display = 'none';
        document.getElementById('tweet-container').innerHTML = '';
    }
    window.onclick = function(event) { if (event.target == document.getElementById('myModal')) closeModal(); }
</script>
